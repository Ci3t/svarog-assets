<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Svarog Assets</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #0f0f0f; color: #eee; }
    h1 { color: #ffcc00; }
    h2 { color: #66ccff; margin-top: 32px; }
    .game { margin-bottom: 24px; padding: 16px; background: #1a1a1a; border-radius: 8px; }
    .slot { margin: 8px 0; padding: 12px; background: #222; border-radius: 6px; }
    .slot img { max-width: 200px; max-height: 200px; border-radius: 6px; display: block; margin-top: 8px; }
    .match { font-size: 0.85em; color: #aaa; }
    .url { font-family: monospace; font-size: 0.9em; color: #88cc88; word-break: break-all; }
    .note { color: #888; font-size: 0.9em; margin-top: 24px; }
  </style>
</head>
<body>
  <h1>Svarog Assets</h1>
  <p class="note">Current Genshin &amp; WuWa banner images served via jsDelivr.</p>
  <div id="content">Loading manifest...</div>
  <p class="note">Manifest URL: <span class="url">https://cdn.jsdelivr.net/gh/Ci3t/svarog-assets@main/manifest.json</span></p>
  <p class="note">Purge URL: <span class="url">https://purge.jsdelivr.net/gh/Ci3t/svarog-assets@main/manifest.json</span></p>

  <script>
    const base = 'https://cdn.jsdelivr.net/gh/Ci3t/svarog-assets@main/';
    // Embedded manifest for local preview (fallback)
    const manifest = {"genshin":{"character":{"name":"Lauma","match":["lauma","lauma / nefer","nefer"],"image":"genshin/lauma-2026-05.webp"},"weapon":{"name":"Current Genshin Weapon","match":["weapon","weapon_banner","current weapon banner","reliquary of truth","nightweavers looking glass"],"image":"genshin/lauma-weapon-2026-05.webp"}},"wuwa":{"character":{"name":"Hiyuki","match":["hiyuki"],"image":"wuwa/hiyuki-2026-05.webp"},"weapon":{"name":"Frostburn","match":["frostburn"],"image":"wuwa/frostburn-2026-05.webp"}}};

    function render() {
      const el = document.getElementById('content');
      let html = '';
      for (const [game, slots] of Object.entries(manifest)) {
        html += `<div class="game"><h2>${game.toUpperCase()}</h2>`;
        for (const [slot, info] of Object.entries(slots)) {
          const imgUrl = base + info.image;
          html += `<div class="slot">
            <strong>${slot}</strong>: ${info.name}<br>
            <span class="match">match: ${info.match.join(', ')}</span><br>
            <img src="${imgUrl}" alt="${info.name}" loading="lazy" onerror="this.style.display='none'">
          </div>`;
        }
        html += '</div>';
      }
      el.innerHTML = html;
    }
    render();
  </script>
</body>
</html>
