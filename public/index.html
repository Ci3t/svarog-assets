<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Svarog Vault — Honkai Star Rail Asset Gallery</title>
  <style>
    :root {
      --bg: #0b0c10;
      --surface: #1f2833;
      --surface-hover: #2a3544;
      --accent: #66fcf1;
      --accent-dim: #45a29e;
      --text: #c5c6c7;
      --text-muted: #8a8d91;
      --border: #2a3544;
      --shadow: 0 4px 24px rgba(0,0,0,0.45);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }
    header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(11,12,16,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
    }
    .brand { display: flex; align-items: center; gap: 0.6rem; font-weight: 700; font-size: 1.25rem; color: var(--accent); letter-spacing: 0.5px; }
    .brand svg { width: 28px; height: 28px; fill: var(--accent); }
    .subtitle { color: var(--text-muted); font-size: 0.85rem; font-weight: 400; }
    .tabs { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .tab {
      appearance: none; border: 1px solid var(--border); background: var(--surface);
      color: var(--text); padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer;
      font-size: 0.9rem; transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .tab:hover { background: var(--surface-hover); }
    .tab.active { border-color: var(--accent); color: var(--accent); background: rgba(102,252,241,0.08); }
    .sub-tabs { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.8rem; }
    .sub-tab { appearance: none; border: 1px solid transparent; background: transparent; color: var(--text-muted); padding: 0.35rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    .sub-tab:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .sub-tab.active { color: var(--accent); background: rgba(102,252,241,0.08); border-color: var(--accent-dim); }
    main { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
    .stats { display: flex; gap: 1.2rem; flex-wrap: wrap; margin-bottom: 1.2rem; color: var(--text-muted); font-size: 0.85rem; }
    .stats b { color: var(--text); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; transition: transform 0.15s, box-shadow 0.15s; cursor: zoom-in;
      display: flex; flex-direction: column; align-items: center; padding: 0.6rem;
    }
    .card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: var(--accent-dim); }
    .card img { width: 100%; height: 140px; object-fit: contain; border-radius: 8px; display: block; }
    .card .name { margin-top: 0.5rem; font-size: 0.78rem; color: var(--text-muted); text-align: center; word-break: break-word; line-height: 1.2; }
    .loading { text-align: center; padding: 3rem; color: var(--text-muted); }
    .empty { text-align: center; padding: 3rem; color: var(--text-muted); }
    footer { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 2rem; }
    .lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100;
      display: none; align-items: center; justify-content: center; padding: 2rem;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 12px; box-shadow: var(--shadow); }
    .lightbox .close {
      position: absolute; top: 1rem; right: 1.5rem; font-size: 2rem; color: #fff;
      cursor: pointer; opacity: 0.7; transition: opacity 0.2s; user-select: none;
    }
    .lightbox .close:hover { opacity: 1; }
    @media (max-width: 640px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 0.7rem; }
      .card img { height: 110px; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <div class="brand">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        Svarog Vault
      </div>
      <div class="subtitle">Honkai Star Rail &amp; Gacha Asset Reference Gallery</div>
    </div>
    <nav class="tabs" id="gameTabs"></nav>
  </header>

  <main>
    <div class="sub-tabs" id="categoryTabs"></div>
    <div class="stats" id="stats"></div>
    <div class="grid" id="grid"></div>
  </main>

  <footer>
    Built for the Svarog project. All assets belong to their respective publishers.
  </footer>

  <div class="lightbox" id="lightbox">
    <span class="close" id="lightboxClose">&times;</span>
    <img id="lightboxImg" src="" alt="">
  </div>

  <script>
    const GAMES = {
      hsr: {
        label: 'Honkai: Star Rail',
        categories: {
          character_icon: 'Character Icons',
          character_portrait: 'Character Portraits',
          lightcone_preview: 'Light Cones',
          element_icon: 'Elements',
          companions: 'Companions'
        }
      },
      genshin: {
        label: 'Genshin Impact',
        categories: {
          characters: 'Characters',
          weapons: 'Weapons'
        }
      },
      wuwa: {
        label: 'Wuthering Waves',
        categories: {
          characters: 'Characters',
          weapons: 'Weapons'
        }
      }
    };

    let state = { game: 'hsr', category: 'character_icon' };
    let allAssets = [];

    function setHash() {
      history.replaceState(null, '', '#' + state.game + '/' + state.category);
    }

    function readHash() {
      const raw = location.hash.replace(/^#/, '');
      if (!raw) return;
      const [g, c] = raw.split('/');
      if (GAMES[g] && GAMES[g].categories[c]) {
        state.game = g;
        state.category = c;
      }
    }

    function renderGameTabs() {
      const container = document.getElementById('gameTabs');
      container.innerHTML = '';
      for (const [key, info] of Object.entries(GAMES)) {
        const btn = document.createElement('button');
        btn.className = 'tab' + (state.game === key ? ' active' : '');
        btn.textContent = info.label;
        btn.onclick = () => {
          state.game = key;
          const cats = Object.keys(info.categories);
          state.category = cats[0];
          setHash();
          renderUI();
        };
        container.appendChild(btn);
      }
    }

    function renderCategoryTabs() {
      const container = document.getElementById('categoryTabs');
      container.innerHTML = '';
      const cats = GAMES[state.game].categories;
      for (const [key, label] of Object.entries(cats)) {
        const btn = document.createElement('button');
        btn.className = 'sub-tab' + (state.category === key ? ' active' : '');
        btn.textContent = label;
        btn.onclick = () => {
          state.category = key;
          setHash();
          renderUI();
        };
        container.appendChild(btn);
      }
    }

    function basename(path) {
      return path.split('/').pop();
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      const stats = document.getElementById('stats');
      const items = allAssets.filter(a => a.game === state.game && a.category === state.category);

      stats.innerHTML = `
        <span>Game: <b>${GAMES[state.game].label}</b></span>
        <span>Category: <b>${GAMES[state.game].categories[state.category]}</b></span>
        <span>Items: <b>${items.length.toLocaleString()}</b></span>
      `;

      if (items.length === 0) {
        grid.innerHTML = '<div class="empty">No assets found in this category.</div>';
        return;
      }

      // Sort by filename
      items.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

      grid.innerHTML = '';
      const frag = document.createDocumentFragment();
      for (const item of items) {
        const card = document.createElement('div');
        card.className = 'card';
        const img = document.createElement('img');
        img.loading = 'lazy';
        img.src = item.path;
        img.alt = item.name;
        img.onerror = () => { img.style.display = 'none'; card.style.opacity = '0.4'; };
        card.appendChild(img);
        const label = document.createElement('div');
        label.className = 'name';
        label.textContent = item.name;
        card.appendChild(label);
        card.onclick = () => openLightbox(item.path);
        frag.appendChild(card);
      }
      grid.appendChild(frag);
    }

    function openLightbox(src) {
      const lb = document.getElementById('lightbox');
      document.getElementById('lightboxImg').src = src;
      lb.classList.add('open');
    }
    document.getElementById('lightboxClose').onclick = () => {
      document.getElementById('lightbox').classList.remove('open');
    };
    document.getElementById('lightbox').onclick = (e) => {
      if (e.target.id === 'lightbox') document.getElementById('lightbox').classList.remove('open');
    };

    function renderUI() {
      renderGameTabs();
      renderCategoryTabs();
      renderGrid();
    }

    async function loadAssets() {
      // Build inventory from known paths using a tiny directory-list helper if available,
      // otherwise fallback to scanning a manifest. Since this is a static Pages host,
      // we walk the directories by probing a few known patterns, then build the list.
      const prefixes = [];
      for (const [game, info] of Object.entries(GAMES)) {
        for (const cat of Object.keys(info.categories)) {
          prefixes.push(`assets/${game}/${cat}/`);
        }
      }

      // Try to discover files via an internal endpoint or by loading a generated manifest.
      // For a zero-build setup, generate the manifest on the fly with a small script.
      // But Pages doesn't have directory listing, so we generate a static manifest here
      // by probing. However, to keep this robust, we use a tiny inline trick:
      // we attempt to fetch a known manifest.json first; if missing, we construct one
      // by enumerating known files via a quick heuristic.

      // Since this is a generated static site, let's build the manifest client-side
      // by fetching a directory index if the server provides one (some dev servers do).
      // Cloudflare Pages does NOT provide directory listing by default.
      // So we embed a small manifest inline at build time... but we can't run build here.
      // Instead, we will create a manifest.json on disk right now and load it.
      grid.innerHTML = '<div class="loading">Loading gallery...</div>';
    }

    // Since directory listing is unavailable on Pages, we generate a manifest JSON
    // at deploy time by probing the file system. That manifest is created below.
    fetch('manifest.json')
      .then(r => r.ok ? r.json() : [])
      .then(data => {
        allAssets = data;
        readHash();
        renderUI();
      })
      .catch(() => {
        document.getElementById('grid').innerHTML = '<div class="empty">Could not load asset manifest.</div>';
      });

    window.addEventListener('hashchange', () => { readHash(); renderUI(); });
  </script>
</body>
</html>
